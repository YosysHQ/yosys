name: Test extra build flows

on:
  pull_request:
  merge_group:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  pre_job:
    runs-on: ubuntu-latest
    outputs:
      should_skip: ${{ steps.set_output.outputs.should_skip }}
    steps:
      - id: skip_check
        if: ${{ github.event_name != 'merge_group' }}
        uses: fkirc/skip-duplicate-actions@v5.3.2
        with:
          # don't run on documentation changes
          paths_ignore: '["**/README.md", "docs/**", "guidelines/**"]'
          # cancel previous builds if a new commit is pushed
          # but never cancel main
          cancel_others: ${{ github.ref != 'refs/heads/main' }}

      - id: set_output
        run: |
          if [ "${{ github.event_name }}" = "merge_group" ]; then
            echo "should_skip=false" >> $GITHUB_OUTPUT
          elif [ "${{ github.event_name }}" = "push" ]; then
            should_skip=false
          else
            echo "should_skip=${{ steps.skip_check.outputs.should_skip }}" >> $GITHUB_OUTPUT
          fi

  vs-build:
    name: Visual Studio build
    runs-on: windows-latest
    needs: [pre_job]
    if: (github.event_name == 'push' || github.event_name == 'merge_group' || github.event_name == 'workflow_dispatch') && needs.pre_job.outputs.should_skip != 'true'
    steps:
      - uses: actions/checkout@v7
        with:
          submodules: true
          persist-credentials: false

      - name: Setup MSVC
        uses: TheMrMilchmann/setup-msvc-dev@v4
        with:
          arch: x64

      - name: ccache
        uses: hendrikmuhs/ccache-action@v1.2.23
        with:
          key: vs-build
          save: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          restore-keys: |
            vs-build-

      - name: Install flex/bison
        shell: pwsh
        run: |
          choco install winflexbison3 --no-progress

          # Make tools visible to CMake
          echo "C:\Program Files (x86)\GnuWin32\bin" | Out-File -Append -FilePath $env:GITHUB_PATH
          echo "C:\ProgramData\chocolatey\lib\winflexbison3\tools" | Out-File -Append -FilePath $env:GITHUB_PATH

      - name: Configure CMake
        run: >
          cmake -S . -B build
          -G Ninja
          -DCMAKE_BUILD_TYPE=Release
          -DYOSYS_COMPILER_LAUNCHER=ccache

      - name: Build
        run: >
          cmake --build build
          --config Release
          --parallel

  mingw-build:
    name: MINGW64 build
    runs-on: windows-latest
    needs: [pre_job]
    if: (github.event_name == 'push' || github.event_name == 'merge_group' || github.event_name == 'workflow_dispatch') && needs.pre_job.outputs.should_skip != 'true'
    steps:
      - uses: actions/checkout@v7
        with:
          submodules: true
          persist-credentials: false

      - name: Setup MSYS2 (MINGW64)
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true

          install: >-
            base-devel
            bison
            flex
            gawk
            diffutils
            make
            mingw-w64-x86_64-toolchain
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-gtest
            mingw-w64-x86_64-pkgconf
            mingw-w64-x86_64-python
            mingw-w64-x86_64-tcl
            mingw-w64-x86_64-libffi
            mingw-w64-x86_64-git
            mingw-w64-x86_64-ccache

      - name: ccache
        uses: hendrikmuhs/ccache-action@v1.2.23
        with:
          key: mingw-build
          save: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          restore-keys: |
            mingw-build-

      - name: Build Yosys
        shell: msys2 {0}
        run: |
          set -e
          procs=$(nproc)
          rm -rf build
          cmake -S . -B build -DCMAKE_BUILD_TYPE=Release -DYOSYS_COMPILER_LAUNCHER=ccache
          cmake --build build -j${procs}
          ctest --test-dir build/tests/unit --output-on-failure

  wasi-build:
    name: WASI build
    needs: pre_job
    if: (github.event_name == 'push' || github.event_name == 'merge_group' || github.event_name == 'workflow_dispatch') && needs.pre_job.outputs.should_skip != 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          submodules: true
          persist-credentials: false

      - name: ccache
        uses: hendrikmuhs/ccache-action@v1.2.23
        with:
          key: wasi-build
          save: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          restore-keys: |
            wasi-build-

      - name: Build
        run: |
          WASI_VER=33
          WASI_SDK=wasi-sdk-${WASI_VER}.0-x86_64-linux
          WASI_SDK_URL=https://github.com/WebAssembly/wasi-sdk/releases/download/wasi-sdk-${WASI_VER}/${WASI_SDK}.tar.gz
          if ! [ -d ${WASI_SDK} ]; then curl -L ${WASI_SDK_URL} | tar xzf -; fi
          WASI_SDK_PATH=$(pwd)/${WASI_SDK}
          FLEX_VER=2.6.4
          FLEX=flex-${FLEX_VER}
          FLEX_URL=https://github.com/westes/flex/releases/download/v${FLEX_VER}/${FLEX}.tar.gz
          if ! [ -d ${FLEX} ]; then curl -L ${FLEX_URL} | tar xzf -; fi

          mkdir -p flex-build
          (cd flex-build &&
            ../${FLEX}/configure --prefix=$(pwd)/../flex-prefix &&
            make &&
            make install)

          export PATH=${WASI_SDK_PATH}/bin:$(pwd)/flex-prefix/bin:${PATH}
          cmake -B build -DCMAKE_TOOLCHAIN_FILE=${WASI_SDK_PATH}/share/cmake/wasi-sdk-p1.cmake -DCMAKE_BUILD_TYPE=Release -DYOSYS_COMPILER_LAUNCHER=ccache .
          cmake --build build -j$(nproc)

  extra-builds-result:
    runs-on: ubuntu-latest
    needs:
      - vs-build
      - mingw-build
      - wasi-build
    if: always()
    steps:
      - name: Check results
        run: |
          echo "Needs results: ${{ join(needs.*.result, ',') }}"
          if [[ "${{ join(needs.*.result, ',') }}" == *failure* ]] || \
            [[ "${{ join(needs.*.result, ',') }}" == *cancelled* ]]; then
            echo "Some jobs failed or were cancelled"
            exit 1
          fi
      - run: echo "All good"
